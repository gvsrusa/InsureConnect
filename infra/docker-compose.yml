name: insureconnect-local

x-api-common: &api-common
  build:
    context: ..
    dockerfile: apps/api/Dockerfile
  environment:
    NODE_ENV: production
    PORT: 4000
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/insureconnect?schema=public
    REDIS_URL: redis://redis:6379
    JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
    JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production-min-32-chars
    CORS_ORIGIN: http://localhost
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  expose:
    - "4000"
  restart: unless-stopped

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  api:
    <<: *api-common

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost
      INTERNAL_API_BASE_URL: http://nginx
      NEXT_PUBLIC_APP_URL: http://localhost
    expose:
      - "3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: insureconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insureconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
